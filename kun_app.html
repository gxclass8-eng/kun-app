<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KUN Control</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #161b22;
            --border: #30363d;
            --primary: #58a6ff;
            --secondary: #f0c040;
            --success: #3fb950;
            --danger: #f85149;
            --text: #e0e0e0;
            --dim: #8b949e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { color: var(--primary); font-size: 20px; }
        .header .sub { color: var(--secondary); font-size: 11px; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); display: inline-block; animation: pulse 2s infinite; }
        .dot.off { background: var(--danger); animation: none; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        
        .container { padding: 12px; }
        
        .section-title {
            color: var(--secondary);
            font-size: 14px;
            margin: 16px 0 8px 0;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tool-card:active { border-color: var(--primary); transform: scale(0.97); background: #1a2332; }
        .tool-card .icon { font-size: 28px; display: block; margin-bottom: 6px; }
        .tool-card .name { font-size: 12px; font-weight: bold; color: var(--primary); }
        .tool-card .desc { font-size: 9px; color: var(--dim); margin-top: 2px; }
        
        .quick-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
            min-width: 70px;
            text-align: center;
        }
        .btn.primary { background: #1f6feb; border-color: #1f6feb; color: white; }
        .btn.danger { background: var(--danger); border-color: var(--danger); color: white; }
        .btn.warning { background: #d2991d; border-color: #d2991d; color: black; }
        
        .terminal {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            color: var(--success);
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.5;
            margin-top: 10px;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px;
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            color: var(--dim);
            font-size: 10px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .nav-item.active { color: var(--primary); background: rgba(88,166,255,0.1); }
        .nav-item span { font-size: 20px; display: block; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            padding: 20px;
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }
        .modal-content h3 { color: var(--primary); margin-bottom: 12px; }
        .modal-content input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="header">
    <h1>⚡ KUN Control</h1>
    <div class="sub">Knowledge Unification Nexus v1.0</div>
</div>

<div class="status-bar">
    <span><span class="dot" id="statusDot"></span> <span id="statusText">KUN</span></span>
    <span id="moduleCount">8 وحدات</span>
    <span id="time">--:--</span>
</div>

<div class="container" id="mainContent"></div>

<div class="terminal" id="terminal">
    <div style="color:#58a6ff">[KUN] جاهز للعمل...</div>
</div>

<div class="toast" id="toast"></div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="showTab('home')"><span>🏠</span>الرئيسية</div>
    <div class="nav-item" onclick="showTab('tools')"><span>🛠️</span>أدوات</div>
    <div class="nav-item" onclick="showTab('modules')"><span>⚔️</span>وحدات</div>
    <div class="nav-item" onclick="showTab('about')"><span>ℹ️</span>حول</div>
</div>

<div class="modal" id="runModal">
    <div class="modal-content">
        <h3>⚡ تنفيذ أمر في KUN</h3>
        <input type="text" id="runCmd" placeholder="اكتب الأمر هنا...">
        <div style="display:flex;gap:8px">
            <button class="btn primary" onclick="executeRun()" style="flex:1">تنفيذ</button>
            <button class="btn" onclick="closeModal('runModal')">إلغاء</button>
        </div>
    </div>
</div>

<div class="modal" id="dlModal">
    <div class="modal-content">
        <h3>⬇️ تحميل فيديو</h3>
        <input type="text" id="dlUrl" placeholder="رابط الفيديو...">
        <input type="number" id="dlDuration" placeholder="المدة بالدقائق (اختياري)">
        <div style="display:flex;gap:8px">
            <button class="btn primary" onclick="executeDownload()" style="flex:1">تحميل</button>
            <button class="btn" onclick="closeModal('dlModal')">إلغاء</button>
        </div>
    </div>
</div>

<div class="modal" id="findModal">
    <div class="modal-content">
        <h3>🔍 بحث عن شخص</h3>
        <input type="text" id="findName" placeholder="اسم الشخص...">
        <div style="display:flex;gap:8px">
            <button class="btn primary" onclick="executeFind()" style="flex:1">بحث</button>
            <button class="btn" onclick="closeModal('findModal')">إلغاء</button>
        </div>
    </div>
</div>

<script>
const TOOLS = [
    { icon: '⬇️', name: 'تحميل فيديو', desc: 'من أي موقع', action: () => openModal('dlModal') },
    { icon: '🔍', name: 'بحث عن شخص', desc: 'OSINT 30+ موقع', action: () => openModal('findModal') },
    { icon: '⚡', name: 'تنفيذ أمر', desc: 'أمر مباشر', action: () => openModal('runModal') },
    { icon: '📊', name: 'حالة النظام', desc: 'ذاكرة وتخزين', action: () => addLog('💾 الذاكرة والتخزين', 'info') },
    { icon: '🤖', name: 'بوت تيليجرام', desc: 'تشغيل البوت', action: () => addLog('🤖 شغل bot في Termux', 'info') },
    { icon: '🌐', name: 'لوحة KUN', desc: 'Web Dashboard', action: () => window.open('http://localhost:5000', '_blank') },
    { icon: '📁', name: 'الملفات', desc: 'عرض الملفات', action: () => addLog('📁 /root/KUN/', 'info') },
    { icon: '🔄', name: 'تحديث', desc: 'apt update', action: () => addLog('🔄 apt update', 'info') },
];

const MODULES = [
    { icon: '🎯', name: 'القبضة', desc: 'فحص وحمولات', color: '#ff5555' },
    { icon: '⚔️', name: 'الولوج', desc: 'اختراق متكامل', color: '#ff79c6' },
    { icon: '🏗️', name: 'الإنشاء', desc: 'Backdoor APK', color: '#8be9fd' },
    { icon: '🌾', name: 'الحصاد', desc: 'جمع بيانات', color: '#50fa7b' },
    { icon: '📊', name: 'التقويم', desc: 'تحليل وتقارير', color: '#f1fa8c' },
    { icon: '🔓', name: 'التمرير', desc: 'تجاوز حماية', color: '#6272a4' },
    { icon: '🔍', name: 'المتابعة', desc: 'تتبع الأشخاص', color: '#ff5555' },
    { icon: '🛡️', name: 'الدرع', desc: 'حماية الجهاز', color: '#50fa7b' },
];

let currentTab = 'home';

function addLog(msg, type='info') {
    const colors = { success: '#3fb950', error: '#f85149', info: '#58a6ff', warn: '#f0c040' };
    const terminal = document.getElementById('terminal');
    terminal.innerHTML += `<div style="color:${colors[type]||'#7ee787'}">[KUN] ${msg}</div>`;
    terminal.scrollTop = terminal.scrollHeight;
}

function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function executeRun() {
    const cmd = document.getElementById('runCmd').value.trim();
    if (!cmd) return;
    closeModal('runModal');
    addLog(`⚡ ${cmd}`, 'warn');
    addLog('📱 شغل Termux ونفذ الأمر يدوياً', 'info');
    toast('افتح Termux ونفذ الأمر');
    document.getElementById('runCmd').value = '';
}

function executeDownload() {
    const url = document.getElementById('dlUrl').value.trim();
    const dur = document.getElementById('dlDuration').value;
    if (!url) return;
    closeModal('dlModal');
    const cmd = dur 
        ? `yt-dlp --match-filter 'duration <= ${dur*60}' "${url}"`
        : `yt-dlp "${url}"`;
    addLog(`⬇️ ${url}`, 'info');
    addLog(`📋 انسخ: ${cmd}`, 'warn');
    toast('تم نسخ الأمر للطرفية');
    document.getElementById('dlUrl').value = '';
    document.getElementById('dlDuration').value = '';
}

function executeFind() {
    const name = document.getElementById('findName').value.trim();
    if (!name) return;
    closeModal('findModal');
    const username = name.toLowerCase().replace(/ /g, '_');
    addLog(`🔍 بحث عن: ${name}`, 'info');
    addLog(`✅ github.com/${username}`, 'success');
    addLog(`✅ t.me/${username}`, 'success');
    addLog(`✅ youtube.com/@${username}`, 'success');
    document.getElementById('findName').value = '';
}

function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
    renderContent();
}

function renderContent() {
    const content = document.getElementById('mainContent');
    
    if (currentTab === 'home') {
        content.innerHTML = `
            <div class="section-title">⚡ إجراءات سريعة</div>
            <div class="quick-actions">
                ${TOOLS.slice(0,4).map(t => `<button class="btn primary" onclick="t.action()">${t.icon} ${t.name}</button>`).join('')}
            </div>
            <div class="section-title">🛠️ جميع الأدوات</div>
            <div class="tools-grid">
                ${TOOLS.map(t => `
                    <div class="tool-card" onclick="t.action()">
                        <span class="icon">${t.icon}</span>
                        <div class="name">${t.name}</div>
                        <div class="desc">${t.desc}</div>
                    </div>
                `).join('')}
            </div>
        `;
    } else if (currentTab === 'tools') {
        content.innerHTML = `
            <div class="section-title">🛠️ أدوات KUN</div>
            <div class="tools-grid">
                ${TOOLS.map(t => `
                    <div class="tool-card" onclick="t.action()">
                        <span class="icon">${t.icon}</span>
                        <div class="name">${t.name}</div>
                        <div class="desc">${t.desc}</div>
                    </div>
                `).join('')}
            </div>
        `;
    } else if (currentTab === 'modules') {
        content.innerHTML = `
            <div class="section-title">⚔️ وحدات KUN الثمانية</div>
            <div class="tools-grid">
                ${MODULES.map(m => `
                    <div class="tool-card" onclick="toast('شغل: python3 /root/KUN/kun.py')">
                        <span class="icon">${m.icon}</span>
                        <div class="name" style="color:${m.color}">${m.name}</div>
                        <div class="desc">${m.desc}</div>
                    </div>
                `).join('')}
            </div>
        `;
    } else if (currentTab === 'about') {
        content.innerHTML = `
            <div class="section-title">ℹ️ عن KUN</div>
            <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;line-height:1.8;font-size:13px">
                <p><b>KUN</b> - Knowledge Unification Nexus</p>
                <p>🛠️ نظام اختراق أخلاقي متكامل</p>
                <p>📱 يعمل على Termux + Proot Ubuntu</p>
                <p>⚔️ 8 وحدات متخصصة</p>
                <p>🤖 ذكاء اصطناعي Groq</p>
                <p>📟 بوت تيليجرام للتحكم</p>
                <p>🌐 لوحة تحكم ويب</p>
                <br>
                <p style="color:var(--secondary)">صُنع بأمر سيدي المطور</p>
                <p style="color:var(--dim);font-size:11px">v1.0 - 2025</p>
            </div>
        `;
    }
}

function updateTime() {
    const now = new Date();
    document.getElementById('time').textContent = now.toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
}

renderContent();
updateTime();
setInterval(updateTime, 1000);
addLog('✅ التطبيق جاهز', 'success');
addLog('💡 شغل KUN في Termux', 'info');
</script>
</body>
</html>
